<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Guess Game</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Noto+Serif+Myanmar:wght@100;200;300;400;500;600;700;800;900&family=Orbitron:wght@400..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap");
      
    </style>
  </head>
  <body>
    <main>
      <div>
        <h2>နံပါတ်ခန့်မှန်းတဲ့ Game ကနေကြိုဆိုပါတယ်။</h2>
        <p>( ၁ ကနေ ၁၀၀ )အတွင်း သင်ခန့်မှန်းတဲ့ number ကိုရိုက်ထည့်ပါ။</p>
        <!-- <p>!သတိပြုရန်! ( ၁ ကနေ ၁၀ )အတွင်းသာ..</p> -->
        <input  class="guess" type="number" placeholder="1-100" /><br>
        <button id="btn-1" onclick="guess()">ခန့်မှန်းမယ်</button>
        <p id="msg-1"></p>
        <p id="msg-2">ထပ်ကြိုးစားခွင့် :</p>
        <p id="msg-3">ခန့်မှန်းပြီးတဲ့ number :</p>
        <button id="btn-2" onclick="restart()">ပြန်စမယ်</button>
      </div>
    </main>
  </body>
  <script src="./index.js"></script>
</html>
